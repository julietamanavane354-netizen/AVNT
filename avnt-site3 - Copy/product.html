<!DOCTYPE html>
<html lang="pt-MZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Produto — AVNT</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .pp-wrap{ display:grid; grid-template-columns:1.1fr 0.9fr; gap:70px; }
  .pp-gallery{ display:flex; flex-direction:column; gap:2px; }
  .pp-gallery img{ width:100%; background:var(--paper-dim); }
  .pp-info{ position:sticky; top:110px; align-self:start; }
  .pp-detail-list{ margin-top:26px; border-top:1px solid var(--line-light); padding-top:20px; }
  .pp-detail-list li{ display:flex; justify-content:space-between; font-size:13.5px; padding:9px 0; border-bottom:1px solid var(--line-light); color:var(--stone); }
  .related-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(240px,1fr)); gap:2px; background:var(--line-light); margin-top:30px; }
  .rel-card{ background:var(--paper); }
  .rel-card img{ width:100%; aspect-ratio:1/1.1; object-fit:cover; }
  .rel-card .p-body{ padding:16px 18px 20px; }
  @media (max-width:820px){ .pp-wrap{ grid-template-columns:1fr; } .pp-info{ position:static; } .related-grid{ grid-template-columns:1fr 1fr; } }
</style>
</head>
<body>

<header class="nav">
  <a href="index.html" class="nav-word">AVNT</a>
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
    <a href="shop.html" class="nav-cta">Shop</a>
  </nav>
  <button class="nav-burger">Menu</button>
</header>

<div class="mobile-menu" style="position:fixed;inset:0;top:0;background:var(--ink);z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;transform:translateY(-100%);transition:transform .4s var(--ease);"></div>

<section class="pt-nav section-pad">
  <div class="wrap">
    <a href="shop.html" style="font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--stone);display:inline-block;margin-bottom:34px;">← Voltar à Shop</a>
    <div class="pp-wrap" id="pp-root"></div>
  </div>
</section>

<section class="section-pad" style="padding-top:0;">
  <div class="wrap">
    <p class="eyebrow" style="margin-bottom:18px;">Também da capsule</p>
    <div class="related-grid" id="related"></div>
  </div>
</section>

<footer id="footer-slot"></footer>
<a class="float-wa" target="_blank" href="#" id="wa-float" aria-label="WhatsApp">
  <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38a9.9 9.9 0 0 0 4.74 1.21h.01c5.46 0 9.9-4.45 9.9-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2m0 1.8c2.17 0 4.21.85 5.74 2.38a8.08 8.08 0 0 1 2.38 5.73c0 4.47-3.64 8.11-8.12 8.11a8.1 8.1 0 0 1-4.13-1.13l-.3-.17-3.11.82.83-3.03-.19-.31a8.06 8.06 0 0 1-1.24-4.32c0-4.47 3.65-8.11 8.14-8.11m-4.6 4.6c-.16 0-.43.06-.65.31s-.86.84-.86 2.04.88 2.37 1 2.53c.13.17 1.72 2.7 4.28 3.72 2.12.85 2.55.68 3.01.64.46-.05 1.48-.6 1.69-1.19.21-.58.21-1.08.15-1.19-.07-.11-.24-.17-.5-.3-.27-.13-1.58-.78-1.83-.87s-.42-.13-.6.13c-.18.27-.68.87-.84 1.04-.15.18-.31.2-.57.07-.27-.13-1.13-.42-2.15-1.34-.8-.71-1.33-1.59-1.49-1.86-.15-.27-.02-.41.12-.54.12-.12.27-.31.4-.47.13-.16.18-.27.27-.45.09-.18.05-.34-.02-.47-.07-.13-.6-1.48-.83-2.02-.22-.53-.44-.46-.6-.47-.16-.01-.34-.01-.5-.01z"/></svg>
</a>

<script src="js/products.js"></script>
<script src="js/main.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const id = params.get('id') || AVNT_PRODUCTS[0].id;
  const product = AVNT_PRODUCTS.find(p => p.id === id) || AVNT_PRODUCTS[0];

  document.getElementById('page-title').textContent = product.name + " — AVNT";

  document.getElementById('pp-root').innerHTML = `
    <div class="pp-gallery reveal">
      ${product.images.map(src => `<img src="${src}" alt="${product.name}">`).join('')}
    </div>
    <div class="pp-info reveal">
      <p class="eyebrow" style="margin-bottom:14px;">${product.capsuleLabel} · ${product.type}</p>
      <h1 style="font-size:clamp(30px,4.5vw,46px);margin-bottom:18px;">${product.name}</h1>
      <p style="font-size:22px;font-weight:600;font-family:'Archivo';margin-bottom:22px;">${avntFormatPrice(product.price)}</p>
      <p style="color:var(--stone);font-size:15px;line-height:1.7;max-width:440px;">${product.desc}</p>
      <a class="btn btn-solid" style="margin-top:30px;" target="_blank"
         href="${avntWaLink('Olá AVNT! Quero comprar: ' + product.name + ' (' + avntFormatPrice(product.price) + ').')}">
         Comprar via WhatsApp
      </a>
      <ul class="pp-detail-list">
        ${product.details.map(d => `<li><span>${d}</span></li>`).join('')}
      </ul>
    </div>`;

  document.getElementById('related').innerHTML = AVNT_PRODUCTS
    .filter(p => p.capsule === product.capsule && p.id !== product.id)
    .concat(AVNT_SETS.filter(s => s.capsule === product.capsule).map(s => ({...s, images:[s.image], type:'Set Completo', name:'Tee + Pants'})))
    .map(p => `
      <a href="${p.id.startsWith('set-') ? 'shop.html#'+p.capsule : 'product.html?id='+p.id}" class="rel-card">
        <img src="${p.images ? p.images[0] : p.image}" alt="${p.name}">
        <div class="p-body">
          <span class="p-cap">${p.capsuleLabel} · ${p.type}</span>
          <span class="p-name">${p.name}</span>
        </div>
      </a>`).join('');

  const waMsg = "Olá AVNT! Quero saber mais sobre a coleção.";
  document.getElementById('wa-float').href = avntWaLink(waMsg);
  document.getElementById('footer-slot').outerHTML = `
  <footer>
    <div class="wrap">
      <div class="foot-top">
        <div class="foot-word display">AVNT</div>
        <p class="eyebrow" style="max-width:220px;text-align:right;">Future in Motion.<br>Dream Chasers.</p>
      </div>
      <div class="foot-cols">
        <div class="foot-col">
          <h4>Navegar</h4>
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="about.html">About</a>
        </div>
        <div class="foot-col">
          <h4>Contacto</h4>
          <a href="${avntWaLink('Olá AVNT! Quero saber mais.')}" target="_blank">WhatsApp</a>
          <a href="https://instagram.com/avntwrld" target="_blank">Instagram</a>
        </div>
        <div class="foot-col">
          <h4>Comunidade</h4>
          <span>Dream Chasers</span>
          <span>Moçambique · Global</span>
        </div>
      </div>
      <div class="foot-bottom">
        <span>© AVNT — Todos os direitos reservados</span>
        <span>Built Different</span>
      </div>
    </div>
  </footer>`;
</script>
</body>
</html>
